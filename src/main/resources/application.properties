# ═══════════════════════════════════════════════════════════════════════════════
# APPLICATION.PROPERTIES - Externalized Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file is the SINGLE SOURCE OF TRUTH for application configuration.
# In Spring Boot, this file is automatically loaded from the classpath.
#
# WHY EXTERNALIZED CONFIGURATION?
# ────────────────────────────────────
# Instead of hardcoding values like port=8080 in Java code:
#   1. Change settings WITHOUT recompiling
#   2. Use DIFFERENT values per environment (dev, staging, production)
#   3. Keep SECRETS separate from code (API keys, DB passwords)
#
# ═══════════════════════════════════════════════════════════════════════════════

# ── Server Configuration ──────────────────────────────────────────────────────
# These values are injected into beans using @Value("server.port")
server.port=8080
server.thread-pool-size=10

# ── Application Metadata ─────────────────────────────────────────────────────
app.name=HSpring Framework
app.version=1.0.0

# ── User Service Configuration ───────────────────────────────────────────────
# Demonstrates how services can read config without hardcoding
user.default-role=USER
